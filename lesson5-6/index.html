<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .flex{
      display: flex;
      flex-direction: row;
      justify-content: center;
      /* flex-wrap: wrap; */
      /* gap: 120px; */
      height: 700px;
      /* max-width: 1000px; */
      width: 700px;
      align-content: start;
      align-items: center;
    }
    .circle{
      width: 200px;
      height: 100px;
      /* border: 1px solid black; */
      border-radius: 50%;
      background-color: antiquewhite;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2></h2>
    <div class="flex">
      <div class="circle" style="flex-shrink: 1;">1</div>
      <div class="circle" style="flex-shrink: 3;">2</div>
      <div class="circle" style="flex-shrink: 1; align-self: self-end;">3</div>
      <div class="circle" style="flex-shrink: 3;">4</div>
      <div class="circle" style="flex-shrink: 1;">5</div>
      <!-- <div class="circle">1</div>
      <div class="circle">2</div>
      <div class="circle">3</div>
      <div class="circle">4</div>
      <div class="circle">5</div>       -->
    </div>
  </div>
</body>
</html>
